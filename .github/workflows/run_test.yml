name: uMCX CI

on: [push, pull_request]

env:
  KMP_WARNINGS: "0"

jobs:
  no_gpu_test:
    name: CPU test
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-15-intel, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install GCC (macos-14 only)
        if: ${{ matrix.os == 'macos-14' }}
        run: |
          brew install gcc@13
          g++-13 --version

      - name: Install dependencies (Windows only)
        if: ${{ runner.os == 'Windows' }}
        run: |
          choco install mingw -y
          echo 'C:\ProgramData\mingw64\mingw64\bin' >> $GITHUB_PATH

      - name: Build binary on macOS 15 Intel
        if: ${{ matrix.os == 'macos-15-intel' }}
        run: |
          g++-14 --version
          cd src
          make CXX=g++-14

      - name: Build binary on macOS 14
        if: ${{ matrix.os == 'macos-14' }}
        run: |
          g++-13 --version
          cd src
          make CXX=g++-13

      - name: Build binary on Windows
        if: ${{ runner.os == 'Windows' }}
        run: |
          g++ --version
          cd src
          make

      - name: Build binary on Linux
        if: ${{ runner.os == 'Linux' }}
        run: |
          g++ --version
          cd src
          make

      - name: Run benchmarks
        run: |
          cd bin
          ./umcx cube60
          ./umcx cube60b

      - name: Run tests
        run: |
          cd test
          ./testumcx.sh

      - name: CMake OpenACC CPU (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          cmake -B build_omp_acc -S src -DBACKEND=OMP -DACC=ON
          cmake --build build_omp_acc
          cd test && ./testumcx.sh

  gcc_nvptx_gpu_offloading_test:
    name: NVIDIA GPU gcc nvptx test
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install dependencies (ubuntu-22.04)
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          sudo apt-get install gcc-11 g++-11 gcc-12 g++-12 gcc-11-offload-nvptx gcc-12-offload-nvptx -y

      - name: Install dependencies (ubuntu-24.04)
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo apt-get install gcc-12 g++-12 gcc-13 g++-13 gcc-12-offload-nvptx gcc-13-offload-nvptx -y

      - name: Fix g++-13 missing libgomp accel symlink
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo ln -sf /usr/lib/gcc/x86_64-linux-gnu/12/accel \
                      /usr/lib/gcc/x86_64-linux-gnu/13/accel || true

      - name: Build binary g++-11
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          cd src
          make clean
          make nvidia CXX=g++-11
          ../bin/umcx cube60 || true

      - name: Run tests for g++-11
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          cd test
          ./testumcx.sh || true

      - name: Build binary g++-12
        run: |
          cd src
          make clean
          make nvidia CXX=g++-12

      - name: Run tests for g++-12
        run: |
          cd test
          ./testumcx.sh

      - name: Build binary g++-13
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cd src
          make clean
          make nvidia CXX=g++-13

      - name: Run tests for g++-13
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cd bin
          ./umcx cube60 || true

      - name: Installing g++-14
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo apt-get install gcc-14 g++-14 gcc-14-offload-nvptx -y

      - name: Build binary g++-14
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cd src
          make clean
          make nvidia CXX=g++-14

      - name: Run tests for g++-14
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cd bin
          ./umcx cube60 || true

      - name: CMake OpenACC NVIDIA g++-11 (ubuntu-22.04)
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          cmake -B build_nvidia_acc11 -S src -DBACKEND=NVIDIA -DACC=ON -DCMAKE_CXX_COMPILER=g++-11
          cmake --build build_nvidia_acc11 && cd test && ./testumcx.sh || true

      - name: CMake OpenACC NVIDIA g++-12
        run: |
          cmake -B build_nvidia_acc12 -S src -DBACKEND=NVIDIA -DACC=ON -DCMAKE_CXX_COMPILER=g++-12
          cmake --build build_nvidia_acc12 && cd test && ./testumcx.sh

      - name: CMake OpenACC NVIDIA g++-13 (ubuntu-24.04)
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cmake -B build_nvidia_acc13 -S src -DBACKEND=NVIDIA -DACC=ON -DCMAKE_CXX_COMPILER=g++-13
          cmake --build build_nvidia_acc13 && cd test && ./testumcx.sh

      - name: CMake OpenACC NVIDIA g++-14 (ubuntu-24.04)
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cmake -B build_nvidia_acc14 -S src -DBACKEND=NVIDIA -DACC=ON -DCMAKE_CXX_COMPILER=g++-14
          cmake --build build_nvidia_acc14 && cd test && ./testumcx.sh

  clang_nvptx_gpu_offloading_test:
    name: NVIDIA GPU clang nvptx test
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install dependencies (ubuntu-22.04)
        if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          wget -qO /tmp/llvm.asc https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo cp /tmp/llvm.asc /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install clang-17 libomp-17-dev clang-tools-17 -y

      - name: Install dependencies (ubuntu-24.04)
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo apt-get install clang-17 libomp-17-dev clang-tools-17 -y

      - name: Install CUDA 11.8 toolkit
        if: ${{ runner.os == 'Linux' }}
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/11.8.0/local_installers/cuda_11.8.0_520.61.05_linux.run
          sudo sh cuda_11.8.0_520.61.05_linux.run --silent --toolkit --override
          rm -f cuda_11.8.0_520.61.05_linux.run
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH
          echo "CUDA_PATH=/usr/local/cuda" >> $GITHUB_ENV

      - name: Build binary clang++-17
        run: |
          cd src
          make clean
          make nvidiaclang CXX=clang++-17 USERCXXFLAGS="--cuda-path=/usr/local/cuda" || true
          echo 'LD_LIBRARY_PATH=/usr/lib/llvm-17/lib/:$LD_LIBRARY_PATH' >> $GITHUB_ENV

      - name: Run benchmarks for clang++-17
        run: |
          cd bin
          ./umcx cube60 || true
          ./umcx cube60b || true

      - name: Run tests for clang++-17
        run: |
          cd test
          ./testumcx.sh || true

      - name: Installing clang-18
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo apt-get install clang-18 libomp-18-dev clang-tools-18 -y

      - name: Build binary clang++-18
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cd src
          make clean
          make nvidiaclang CXX=clang++-18 USERCXXFLAGS="--cuda-path=/usr/local/cuda" || true
          echo 'LD_LIBRARY_PATH=/usr/lib/llvm-18/lib/:$LD_LIBRARY_PATH' >> $GITHUB_ENV

      - name: Run benchmarks for clang++-18
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cd bin
          ./umcx cube60 || true
          ./umcx cube60b || true

      - name: Run tests for clang++-18
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          cd test
          ./testumcx.sh || true

  nvc_cpu_test:
    name: nvc++ CPU build & test
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Cache HPC SDK
        id: cache-hpc
        uses: actions/cache@v4
        with:
          path: /opt/nvidia/hpc_sdk
          key: nvhpc-25.3-linux-slim

      - name: Install HPC SDK
        if: ${{ steps.cache-hpc.outputs.cache-hit != 'true' }}
        run: |
          curl -fsSL https://developer.download.nvidia.com/hpc-sdk/ubuntu/DEB-GPG-KEY-NVIDIA-HPC-SDK \
            | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-hpcsdk-archive-keyring.gpg
          echo 'deb [signed-by=/usr/share/keyrings/nvidia-hpcsdk-archive-keyring.gpg] https://developer.download.nvidia.com/hpc-sdk/ubuntu/amd64 /' \
            | sudo tee /etc/apt/sources.list.d/nvhpc.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nvhpc-25-3
          # slim install to ~1.5GB by removing bundled CUDA toolkit, MPI, math libs, and profilers
          BASE=/opt/nvidia/hpc_sdk/Linux_x86_64/25.3
          sudo rm -rf $BASE/cuda $BASE/comm_libs $BASE/math_libs $BASE/profilers $BASE/examples
          du -sh /opt/nvidia/hpc_sdk

      - name: Add nvc++ to PATH
        run: echo "/opt/nvidia/hpc_sdk/Linux_x86_64/25.3/compilers/bin" >> $GITHUB_PATH

      - name: Verify nvc++ available
        run: nvc++ --version

      - name: Build umcx CPU-only with nvc++ (host OpenMP, no GPU offload)
        run: |
          cd src
          mkdir -p ../bin
          # nvc++ doesn't recognize -foffload=disable, so bypass the Makefile and invoke directly.
          # -mp without =gpu means host-only multicore OpenMP; no -DGPU_OFFLOAD so the source
          # uses the HOST_LOOP path which is plain "omp parallel for".
          nvc++ -O3 -std=c++11 -mp -I. -o ../bin/umcx umcx.cpp

      - name: Run benchmarks
        run: |
          cd bin
          ./umcx cube60
          ./umcx cube60b

      - name: Run tests
        run: |
          cd test
          ./testumcx.sh

  mex_test:
    name: MATLAB MEX build & NeuroJSON test
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v1
        with:
          release: R2022a

      - name: Build umcx MEX
        run: |
          cd src
          make mex
          ls -la ../umcxlab/

      - name: Clone jsonlab (provides loadjson/savebj)
        run: |
          git clone --depth 1 https://github.com/NeuroJSON/jsonlab.git

      - name: Download built-in MCX simulations from NeuroJSON.io
        run: |
          # Same URL pattern as umcx -N/--net (see umcx.cpp)
          for name in cube60 colin27 digimouse; do
              echo "=== downloading $name.json ==="
              curl -fsSL --retry 3 "https://neurojson.io:7777/mcx/$name" -o "$name.json"
              ls -lh "$name.json"
              test -s "$name.json"
          done

      - name: Run MEX simulations in MATLAB
        uses: matlab-actions/run-command@v1
        env:
          # MATLAB ships an old libstdc++ that lacks GLIBCXX_3.4.29; the MEX was built against
          # the system's newer libstdc++. Preload system lib so MATLAB resolves new symbols.
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libstdc++.so.6
        with:
          command: |
            addpath('umcxlab');
            addpath('jsonlab');
            for name = {'cube60', 'colin27', 'digimouse'}
                fprintf('=== Running %s ===\n', name{1});
                % NeuroJSON.io serves these in umcx JSON format already (Session/Forward/
                % Optode/Domain/Shapes), so mcx2json is NOT needed here — that's for
                % converting MCXLAB-style cfg (cfg.srcpos/.prop/.vol/etc.). Just re-encode
                % the loaded struct as bjdata with no compression to match umcx.mex parser.
                cfg = loadjson([name{1} '.json']);
                cfg.Session.Photons = 1e5;       % CI-time override for speed
                bjdata = uint8(savebj('', cfg, 'compression', ''));
                tic;
                [flux, detp] = umcx(bjdata);
                t = toc;
                assert(~isempty(flux), '%s: flux output empty', name{1});
                assert(isfield(flux, 'data'), '%s: flux has no data field', name{1});
                fprintf('PASS %s: flux.data size = %s, detected = %d, elapsed = %.2fs\n', ...
                    name{1}, mat2str(size(flux.data)), size(detp.data, 1), t);
            end

